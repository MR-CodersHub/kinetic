<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Login // Kinetic Auto Glass</title>
  <link rel="icon" type="image/png" href="../assets/images/brand-logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="antialiased bg-[var(--canvas)] font-body text-[var(--ink-high)] precision-grid-bg min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm space-y-6">
    <!-- Top actions bar -->
    <div class="flex justify-between items-center font-mono text-[10px] uppercase tracking-wider">
      <a href="../index.html" class="flex items-center gap-1 text-[var(--ink-mid)] hover:text-[var(--laser-cyan)] transition-colors font-bold">
        &larr; Back to Home
      </a>
      
      <div class="flex gap-2">
        <!-- RTL Toggle -->
        <button id="rtl-toggle-btn" class="w-8 h-8 border border-[var(--structural-line)] bg-[var(--surface-solid)] hover:border-[var(--laser-cyan)] text-[var(--ink-mid)] hover:text-[var(--laser-cyan)] transition-colors flex items-center justify-center font-bold text-[9px] rounded-none">
          RTL
        </button>
        
        <!-- Theme Toggle -->
        <button id="theme-toggle-btn" class="w-8 h-8 border border-[var(--structural-line)] bg-[var(--surface-solid)] hover:border-[var(--laser-cyan)] text-[var(--ink-mid)] hover:text-[var(--laser-cyan)] transition-colors flex items-center justify-center rounded-none" aria-label="Toggle Theme">
          <svg id="theme-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          <svg id="theme-moon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
      </div>
    </div>

    <!-- Immersive Login Card -->
    <div class="border border-[var(--structural-line)] bg-[var(--surface-solid)] p-6 sm:p-8 shadow-2xl rounded-sm relative overflow-hidden group">
      <!-- Accent top border line -->
      <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-[var(--laser-cyan)] to-[var(--laser-amber)]"></div>
      
      <div class="text-center mb-8 space-y-3">
        <a href="../index.html" class="inline-block">
          <img src="../assets/images/brand-logo.png" class="w-16 h-auto mx-auto hover:opacity-90 transition-opacity" alt="Kinetic Auto Glass Logo">
        </a>
        <div>
          <span class="font-mono text-[9px] text-[var(--ink-low)] uppercase tracking-widest block">// KINETIC AUTO GLASS PORTAL</span>
          <h2 class="text-xl font-bold font-display uppercase tracking-tight text-[var(--ink-high)] mt-1">Account Login</h2>
        </div>
      </div>

      <form class="space-y-5 font-mono text-xs" onsubmit="event.preventDefault();">
        <div class="space-y-1.5">
          <label class="block text-[var(--ink-low)] uppercase tracking-wider text-[10px]">Email Address</label>
          <input type="email" placeholder="customer@email.com" class="w-full bg-[var(--canvas)] border border-[var(--structural-line)] px-3 py-3 rounded-none focus:outline-none focus:border-[var(--laser-cyan)] text-[var(--ink-high)] font-sans" required />
        </div>
        
        <div class="space-y-1.5">
          <div class="flex justify-between items-center">
            <label class="block text-[var(--ink-low)] uppercase tracking-wider text-[10px]">Password</label>
            <a href="#" class="text-[var(--laser-cyan)] hover:underline text-[9px] uppercase tracking-wider font-bold">Forgot Password?</a>
          </div>
          <input type="password" placeholder="••••••••••••" class="w-full bg-[var(--canvas)] border border-[var(--structural-line)] px-3 py-3 rounded-none focus:outline-none focus:border-[var(--laser-cyan)] text-[var(--ink-high)]" required />
        </div>
        
        <div class="pt-2">
          <button type="submit" class="w-full machined-button bg-[var(--ink-high)] text-[var(--canvas)] py-4 font-bold uppercase tracking-widest border-none shadow-[0_0_10px_rgba(0,0,0,0.05)] hover:shadow-[0_0_20px_rgba(0,0,0,0.15)]">
            Login &rarr;
          </button>
        </div>
      </form>
      
      <div class="pt-6 border-t border-[var(--structural-line)]/50 mt-6 text-center font-mono text-[10px] text-[var(--ink-low)] flex justify-between">
        <span>SECURE // TLS 1.3</span>
        <a href="#" class="hover:text-[var(--laser-cyan)] underline">Sign Up Here</a>
      </div>
    </div>
  </div>

  <script src="../assets/js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Theme Toggle Logic
      const themeBtn = document.getElementById('theme-toggle-btn');
      const sunSvg = document.getElementById('theme-sun');
      const moonSvg = document.getElementById('theme-moon');

      const updateThemeIcons = (mode) => {
        if (!sunSvg || !moonSvg) return;
        if (mode === 'dark') {
          sunSvg.classList.remove('hidden');
          moonSvg.classList.add('hidden');
        } else {
          sunSvg.classList.add('hidden');
          moonSvg.classList.remove('hidden');
        }
      };

      const applyTheme = (mode) => {
        document.documentElement.setAttribute('data-theme', mode);
        localStorage.setItem('premium-mode', mode);
        updateThemeIcons(mode);
      };

      // Load initial state
      const currentMode = document.documentElement.getAttribute('data-theme') || 'dark';
      updateThemeIcons(currentMode);

      if (themeBtn) {
        themeBtn.addEventListener('click', () => {
          const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          applyTheme(current);
        });
      }

      // RTL Toggle Logic
      const rtlBtn = document.getElementById('rtl-toggle-btn');
      if (rtlBtn) {
        const updateRtlButton = () => {
          const currentDir = document.documentElement.getAttribute('dir') || 'ltr';
          rtlBtn.innerText = currentDir === 'rtl' ? 'LTR' : 'RTL';
        };
        rtlBtn.addEventListener('click', () => {
          const currentDir = document.documentElement.getAttribute('dir') || 'ltr';
          const nextDir = currentDir === 'rtl' ? 'ltr' : 'rtl';
          document.documentElement.setAttribute('dir', nextDir);
          localStorage.setItem('doc-direction', nextDir);
          updateRtlButton();
        });
        
        // Initialize on load
        const savedDir = localStorage.getItem('doc-direction') || 'ltr';
        document.documentElement.setAttribute('dir', savedDir);
        updateRtlButton();
      }
    });
  </script>
</body>
</html>
